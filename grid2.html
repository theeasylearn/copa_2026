<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        #site {
            height: 100vh;
            width: 100vw;

            display: grid;
            grid-template-rows: 2fr 6fr 2fr;
            grid-template-columns: 1fr 5fr;

            grid-template-areas: "header header"
            "menu content"
            "footer footer";
        }
        #header{
            background-color: aliceblue;
            grid-area: header;
        }
        #menu {
            background-color: bisque;
            grid-area: menu;
        }
        #content {
            background-color: burlywood;
            grid-area: content;
        }
        #footer {
            background-color: cornsilk;
            grid-area: footer;
        }
       
    </style>
</head>

<body>
    <section id="site">
        <div id="header">1</div>
        <div id="menu">2</div>
        <div id="content">3</div>
        <div id="footer">4</div>
    </section>
</body>


</html>
