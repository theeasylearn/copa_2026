<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        #site {
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-rows: 1fr 6fr 1fr;
            grid-template-columns: 1fr 5fr;
        }
        #header{
            background-color: aliceblue;
            height: 100px;
        }
        #menu {
            background-color: bisque;
            height: 100px;
        }
        #content {
            background-color: burlywood;
            height: 100px;
        }
        #footer {
            background-color: cornsilk;
            height: 100px;
        }
       
    </style>
</head>

<body>
    <section id="site">
        <div id="header">1</div>
        <div id="menu">2</div>
        <div id="content">3</div>
        <div id="footer">4</div>
    </section>
</body>


</html>
