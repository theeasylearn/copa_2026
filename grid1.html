<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section {
            height: 100vh;
            width: 100vw;
            display: grid;
            /* for rows */
            grid-template-rows: 1fr 1fr 1fr;
            /* for columns */
            grid-template-columns: 1fr 1fr 1fr;
        }
        div {
            border: 1px solid black;
            background-color: aliceblue;
            font-size: 82px;
            /* won't work id display is flex */
            /* text-align: center;  */ 
            /* vertical-align: middle; */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </section>
</body>


</html>
